plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation libs.junit.jupiter
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    implementation libs.guava
    
    implementation 'io.github.ollama4j:ollama4j:1.1.0' // java wrapper for ollama API
    
    implementation 'org.apache.pdfbox:pdfbox:3.0.3' // apache pdfbox
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'javaollama.App'
}

tasks.named('test') {
    useJUnitPlatform()
}
